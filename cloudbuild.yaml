steps:
  # Backend: build & push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rovx-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rovx-backend:latest'
      - './backend'
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/rovx-backend:$COMMIT_SHA'
    id: 'push-backend'

  # Backend: migrate database
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--network=cloudbuild'
      - '-e'
      - 'DATABASE_URL=$$DATABASE_URL'
      - 'gcr.io/$PROJECT_ID/rovx-backend:$COMMIT_SHA'
      - 'sh'
      - '-c'
      - 'npx prisma migrate deploy && npx ts-node prisma/seed.ts || true'
    id: 'migrate'
    secretEnv: ['DATABASE_URL']

  # Backend: deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'rovx-backend'
      - '--image=gcr.io/$PROJECT_ID/rovx-backend:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=API_PREFIX=api/v1'
      - '--set-env-vars=CORS_ORIGIN=https://rovx-xxxxx.vercel.app'
      - '--set-env-vars=OSRM_URL=https://router.project-osrm.org'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest'
      - '--set-secrets=JWT_SECRET=JWT_SECRET:latest'
      - '--set-secrets=JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest'
    id: 'deploy-backend'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/JWT_SECRET/versions/latest
      env: 'JWT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/JWT_REFRESH_SECRET/versions/latest
      env: 'JWT_REFRESH_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/OPENAI_API_KEY/versions/latest
      env: 'OPENAI_API_KEY'

timeout: '1800s'
